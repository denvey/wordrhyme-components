# GitHub Actions CI workflow for pnpm-based TypeScript project
# This workflow runs tests, linting, type checks, and formatting checks on PRs and workflow calls

name: CI

on:
  push:
    branches:
      - main
      - master
      - next
  pull_request:
    branches:
      - main
      - master
      - next
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    name: JavaScript Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          build: 'true'

      # TODO: Make lint blocking again after the existing repository-wide baseline is fixed.
      - name: Lint (non-blocking)
        continue-on-error: true
        run: pnpm lint

      - name: Prettier check
        run: pnpm format

      - name: TypeScript check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
