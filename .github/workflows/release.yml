name: Release Package

on:
  push:
    branches:
      - main
      - next
  workflow_dispatch:

jobs:
  ci:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml

  release:
    name: Create Release and Publish
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Generate bot app token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASER_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: |
          npm install --global --prefix "$RUNNER_TEMP/npm-global" npm@11.6.2
          echo "$RUNNER_TEMP/npm-global/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/npm-global/bin/npm" --version

      - name: Release
        # Some packages are not configured as npm Trusted Publishers yet. Let the
        # token-authenticated, idempotent recovery publishers below finish those
        # releases when the Changesets OIDC publish attempt fails.
        continue-on-error: true
        uses: pixpilot/changesets-autopilot@v1
        with:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          # No NPM_TOKEN: npm Trusted Publishing authenticates this job via OIDC.
          provenance: true
          # Release only the explicit .changeset entries committed with a change.
          AUTO_CHANGESET: false

      - name: Ensure shadcn-ui release is published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/shadcn-ui/package.json').version")

          if npm view "@wordrhyme/shadcn-ui@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "@wordrhyme/shadcn-ui@$PACKAGE_VERSION is already published"
            exit 0
          fi

          pnpm --filter @wordrhyme/shadcn-ui... build
          pnpm --dir packages/shadcn-ui pack --pack-destination "$RUNNER_TEMP"
          npm publish "$RUNNER_TEMP/wordrhyme-shadcn-ui-$PACKAGE_VERSION.tgz" \
            --access public \
            --provenance

      - name: Ensure formily-shadcn release is published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/shadcn-formily/package.json').version")

          if npm view "@wordrhyme/formily-shadcn@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "@wordrhyme/formily-shadcn@$PACKAGE_VERSION is already published"
            exit 0
          fi

          pnpm --filter @wordrhyme/formily-shadcn... build
          pnpm --dir packages/shadcn-formily pack --pack-destination "$RUNNER_TEMP"
          npm publish "$RUNNER_TEMP/wordrhyme-formily-shadcn-$PACKAGE_VERSION.tgz" \
            --access public \
            --provenance

      - name: Ensure auto-crud release is published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/auto-crud/package.json').version")

          if npm view "@wordrhyme/auto-crud@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "@wordrhyme/auto-crud@$PACKAGE_VERSION is already published"
            exit 0
          fi

          pnpm --filter @wordrhyme/auto-crud... build
          pnpm --dir packages/auto-crud pack --pack-destination "$RUNNER_TEMP"
          npm publish "$RUNNER_TEMP/wordrhyme-auto-crud-$PACKAGE_VERSION.tgz" \
            --access public \
            --provenance
